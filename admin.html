<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CartPrime Admin - Ultimate Control</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-bg: #000000; --accent: #ff9900; --bg-light: #f8fafc; --border: #e2e8f0; --primary: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-light); display: flex; min-height: 100vh; color: #1e293b; overflow-x: hidden; }
        
        .sidebar { width: 260px; height: 100vh; background: var(--sidebar-bg); color: white; padding: 30px 20px; position: fixed; box-shadow: 4px 0 10px rgba(0,0,0,0.1); z-index: 100; transition: 0.3s; }
        .sidebar h2 { margin-bottom: 40px; text-align: center; font-size: 22px; font-weight: 800; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .sidebar button, .sidebar a { width: 100%; padding: 14px; background: transparent; border: none; color: #94a3b8; text-align: left; cursor: pointer; font-size: 14px; font-weight: 600; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; text-decoration: none; transition: 0.3s; }
        .sidebar button:hover, .sidebar button.active, .sidebar a:hover { background: rgba(255,255,255,0.1); color: white; }
        .sidebar i { margin-right: 12px; font-size: 18px; width: 20px; text-align: center; }
        
        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 260px); transition: 0.3s; }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .active-tab { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2.tab-title { font-weight: 800; font-size: 24px; margin-bottom: 30px; }
        .admin-card { background: white; padding: 30px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px;}
        input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--border); border-radius: 12px; font-size: 14px; outline: none; background: #fcfdfe; }
        
        #orderList { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .order-card { background: white; border: 1px solid var(--border); padding: 24px; border-radius: 20px; position: relative; }
        
        .badge-container { position: absolute; top: 20px; right: 20px; display: flex; gap: 6px; }
        .pay-badge, .status-badge { font-size: 10px; padding: 4px 10px; border-radius: 8px; font-weight: 800; text-transform: uppercase; }
        
        .pay-Verified { background: #dcfce7; color: #166534; }
        .pay-Pending { background: #fef9c3; color: #854d0e; }
        .status-Pending { background: #f1f5f9; color: #64748b; }
        .status-Confirmed { background: #dcfce7; color: #166534; }

        .cust-box { background: #f8fafc; padding: 16px; border-radius: 15px; margin: 15px 0; border: 1px solid #f1f5f9; }
        .order-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .order-actions button { padding: 10px; border: none; border-radius: 10px; font-size: 11px; font-weight: 700; cursor: pointer; color: white; }

        .table-responsive { width: 100%; overflow-x: auto; background: white; border-radius: 20px; padding: 10px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { color: #64748b; padding: 15px; text-align: left; font-size: 12px; }
        td { padding: 15px; background: white; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .save-btn { background: var(--primary); color: #fff; width: 100%; padding: 16px; font-weight: 800; border: none; border-radius: 14px; cursor: pointer; margin-top: 10px; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 20px 10px; }
            .sidebar h2, .sidebar button span, .sidebar a span { display: none; }
            .sidebar i { margin-right: 0; font-size: 20px; width: 100%; }
            .main-content { margin-left: 70px; width: calc(100% - 70px); padding: 20px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>CartPrime</h2>
    <button onclick="openTab('orders')" id="btn-orders" class="tablinks active"><i class="fa fa-shopping-bag"></i> <span>Orders</span></button>
    <button onclick="openTab('addProduct')" id="btn-addProduct" class="tablinks"><i class="fa fa-plus"></i> <span>Add Product</span></button>
    <button onclick="openTab('manageProducts')" id="btn-manageProducts" class="tablinks"><i class="fa fa-layer-group"></i> <span>Inventory</span></button>
    <button onclick="openTab('users')" id="btn-users" class="tablinks"><i class="fa fa-user-friends"></i> <span>Users</span></button>
    <a href="home.html" style="margin-top: 20px; border-top: 1px solid #333; padding-top: 20px;"><i class="fa fa-arrow-left"></i> <span>Back Store</span></a>
</div>

<div class="main-content">
    <!-- 1. Orders Tab -->
    <div id="orders" class="tab-content active-tab">
        <h2 class="tab-title">Order Management</h2>
        <div id="orderList"></div>
    </div>

    <!-- 2. Add Product Tab -->
    <div id="addProduct" class="tab-content">
        <h2 class="tab-title">Add New Product</h2>
        <div class="admin-card">
            <input type="text" id="pName" placeholder="Product Name">
            <input type="number" id="pPrice" placeholder="Price (₹)">
            <input type="text" id="pImg" placeholder="Image URL">
            <textarea id="pDesc" placeholder="Product Description" rows="4"></textarea>
            <input type="text" id="pCat" placeholder="Category (e.g. Electronics)">
            <button class="save-btn" onclick="saveProduct()">Save Product</button>
        </div>
    </div>

    <!-- 3. Inventory Tab -->
    <div id="manageProducts" class="tab-content">
        <h2 class="tab-title">Inventory Management</h2>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="inventoryList"></tbody>
            </table>
        </div>
    </div>

    <!-- 4. Users Tab -->
    <div id="users" class="tab-content">
        <h2 class="tab-title">Registered Users</h2>
        <div class="admin-card">
            <div id="userListContainer"></div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue, update, remove, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

// Your Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyDVDcAN5I6Duwb0f5nAIh1sThdK6ELGDGc",
    authDomain: "cartprime-shopping.firebaseapp.com",
    projectId: "cartprime-shopping",
    storageBucket: "cartprime-shopping.firebasestorage.app",
    messagingSenderId: "570068438689",
    appId: "1:570068438689:web:17b25f49f2b561fd29eae0",
    measurementId: "G-9GREWHMEYL"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// --- FCM CONFIGURATION (Replace with your actual Legacy Server Key) ---
const FCM_SERVER_KEY = "firebase-adminsdk-fbsvc@cartprime-shopping.iam.gserviceaccount.com"; 

// --- TAB NAVIGATION ---
window.openTab = (tabId) => {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
    document.querySelectorAll('.tablinks').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active-tab');
    document.getElementById('btn-' + tabId).classList.add('active');
};

// --- PRODUCT FUNCTIONS ---
window.saveProduct = () => {
    const name = document.getElementById('pName').value;
    const price = document.getElementById('pPrice').value;
    const img = document.getElementById('pImg').value;
    const desc = document.getElementById('pDesc').value;
    const cat = document.getElementById('pCat').value;

    if(name && price && img) {
        const newProdRef = push(ref(db, 'products'));
        set(newProdRef, {
            name, price, img, desc, cat,
            id: newProdRef.key
        }).then(() => {
            Swal.fire('Success', 'Product Added Successfully', 'success');
            document.querySelectorAll('#addProduct input, #addProduct textarea').forEach(i => i.value = "");
        }).catch(e => Swal.fire('Error', e.message, 'error'));
    } else {
        Swal.fire('Wait', 'Please fill Name, Price and Image URL', 'warning');
    }
};

window.deleteProduct = (id) => {
    Swal.fire({
        title: 'Delete Product?',
        text: "You won't be able to revert this!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        confirmButtonText: 'Yes, delete it!'
    }).then((result) => {
        if (result.isConfirmed) {
            remove(ref(db, 'products/' + id));
        }
    });
};

// Load Inventory
onValue(ref(db, 'products'), snap => {
    const invList = document.getElementById('inventoryList');
    invList.innerHTML = "";
    if(!snap.exists()) return;
    snap.forEach(child => {
        const p = child.val();
        invList.innerHTML += `
            <tr>
                <td><img src="${p.img}" width="40" style="border-radius:5px; object-fit:cover;"></td>
                <td>${p.name}</td>
                <td>₹${p.price}</td>
                <td>
                    <button onclick="deleteProduct('${child.key}')" style="color:#ef4444; border:none; background:none; cursor:pointer; font-size:16px;">
                        <i class="fa fa-trash"></i>
                    </button>
                </td>
            </tr>`;
    });
});

// --- ORDER FUNCTIONS & NOTIFICATIONS ---

window.confirmOrderWithDate = async (path) => {
    const { value: date } = await Swal.fire({ 
        title: 'Select Delivery Date', 
        input: 'date', 
        showCancelButton: true 
    });

    if (date) {
        update(ref(db, 'orders/' + path), { 
            status: 'Confirmed', 
            deliveryDate: date 
        }).then(() => {
            sendAppNotification(path, date);
        }).catch(err => Swal.fire('Error', err.message, 'error'));
    }
};

async function sendAppNotification(path, deliveryDate) {
    onValue(ref(db, 'orders/' + path), async (snap) => {
        const order = snap.val();
        const userToken = order.userFcmToken; 

        if (!userToken) {
            Swal.fire('Confirmed!', 'Order updated. No notification sent (No Token).', 'info');
            return;
        }

        const messageData = {
            to: userToken,
            notification: {
                title: "Order Confirmed! ✅",
                body: `${order.productName} has been confirmed. Expected Delivery: ${deliveryDate}`,
                sound: "default"
            }
        };

        try {
            await fetch("https://fcm.googleapis.com/fcm/send", {
                method: "POST",
                headers: {
                    "Authorization": "key=" + FCM_SERVER_KEY,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(messageData)
            });
            Swal.fire('Success', 'Order confirmed & Customer notified!', 'success');
        } catch (error) {
            Swal.fire('Warning', 'Order updated, but notification failed.', 'warning');
        }
    }, { onlyOnce: true });
}

// Load Orders
onValue(ref(db, 'orders'), snap => {
    const list = document.getElementById('orderList');
    list.innerHTML = ""; 
    if (!snap.exists()) return;

    snap.forEach(uSnap => {
        uSnap.forEach(oSnap => {
            const o = oSnap.val();
            const path = `${uSnap.key}/${oSnap.key}`;
            const payStatus = o.paymentStatus || "Pending";
            const currentStatus = o.status || "Pending";

            list.innerHTML += `
            <div class="order-card">
                <div class="badge-container">
                    <span class="status-badge status-${currentStatus}">${currentStatus}</span>
                    <span class="pay-badge ${payStatus === 'Paid' ? 'pay-Verified' : 'pay-Pending'}">${payStatus}</span>
                </div>
                <div class="cust-box">
                    <b>${o.customerName || 'User'}</b>
                    <p style="font-size:12px; color:#2563eb;">${uSnap.key}</p>
                    <p style="font-size:11px;">${o.address || 'N/A'}</p>
                </div>
                <div style="display:flex; gap:10px; align-items:center;">
                    <img src="${o.productImage}" style="width:40px; height:40px; border-radius:5px; object-fit:cover;">
                    <div>
                        <p style="font-size:13px; font-weight:800;">${o.productName}</p>
                        <p style="font-size:12px; color:green;">₹${o.price}</p>
                    </div>
                </div>
                <div class="order-actions">
                    <button style="background:#ff9900; grid-column: span 2;" onclick="verifyPayment('${path}')">Verify Payment</button>
                    <button style="background:#16a34a" onclick="confirmOrderWithDate('${path}')">Confirm</button>
                    <button style="background:#2563eb" onclick="updateStatus('${path}', 'Delivered')">Deliver</button>
                    <button style="background:#ef4444; grid-column: span 2;" onclick="deleteItem('${path}')">Delete Order</button>
                </div>
            </div>`;
        });
    });
});

window.verifyPayment = (path) => update(ref(db, 'orders/' + path), { paymentStatus: 'Paid' });
window.updateStatus = (path, s) => update(ref(db, 'orders/' + path), { status: s });
window.deleteItem = (path) => {
    Swal.fire({
        title: 'Delete Order?',
        icon: 'error',
        showCancelButton: true,
        confirmButtonText: 'Delete'
    }).then((r) => { if(r.isConfirmed) remove(ref(db, 'orders/' + path)); });
};

// Load Users
onValue(ref(db, 'users'), snap => {
    const userCont = document.getElementById('userListContainer');
    userCont.innerHTML = "";
    if(!snap.exists()) { userCont.innerHTML = "No users found"; return; }
    snap.forEach(child => {
        const u = child.val();
        userCont.innerHTML += `
            <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                <span><b>${u.name || 'N/A'}</b> (${u.phone || child.key})</span>
                <span style="font-size:11px; color:#666;">${u.email || ''}</span>
            </div>`;
    });
});
</script>
</body>
</html>
