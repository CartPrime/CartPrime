<!DOCTYPE html>
<html lang="en">
   <link rel="icon" type="image/x-icon" href="https://i.ibb.co/v4rQ6Th6/545404-200-removebg-preview.png">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | CartPrime</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #000;
            --bg: #fff;
            --grey: #f4f4f4;
            --star: #ffcc00;
            --red: #ff3b30;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #fff;
            color: #111;
            overflow-x: hidden;
        }

        .nav {
            padding: 15px 5%;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }

        .nav a {
            text-decoration: none;
            color: #000;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .product-container {
            display: flex;
            flex-wrap: wrap;
            padding: 30px 5%;
            gap: 40px;
        }

        .image-section {
            flex: 1;
            min-width: 350px;
        }

        .main-img-container {
            width: 100%;
            height: 500px;
            background: #f9f9f9;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #eee;
        }

        .main-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .thumb-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            overflow-x: auto;
            padding: 5px;
            scrollbar-width: none; /* Firefox */
        }
        
        .thumb-container::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .thumb {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            flex-shrink: 0;
        }

        .thumb.active {
            border-color: var(--primary);
        }

        .info-section {
            flex: 1;
            min-width: 350px;
        }

        .p-name {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
            line-height: 1.3;
            color: #000;
        }

        .price-box {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 15px 0;
        }

        .price {
            font-size: 2.2rem;
            font-weight: 800;
            color: #000;
        }

        .policy-tag {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .policy-yes { color: #27ae60; }
        .policy-no { color: var(--red); }

        .specs-box {
            margin-bottom: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .specs-box h4 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            color: #888;
        }

        .spec-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #f8f8f8;
            font-size: 0.9rem;
        }

        .spec-key {
            width: 130px;
            color: #666;
            font-weight: 600;
        }

        .spec-val {
            font-weight: 700;
            color: #000;
        }

        .desc-text {
            color: #555;
            line-height: 1.7;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .buy-now {
            width: 100%;
            padding: 20px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 18px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .out-btn {
            background: #ccc !important;
            cursor: not-allowed;
        }

        .review-section {
            padding: 40px 5%;
            border-top: 1px solid #eee;
            background: #fafafa;
        }

        .review-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid #eee;
        }
        .rev-name { font-weight: 800; margin-bottom: 5px; }
        .star-rating { color: var(--star); margin-bottom: 8px; }

        /* --- Responsive Queries --- */
        @media (max-width: 768px) {
            .product-container {
                padding: 20px 4%;
                gap: 25px;
            }
            .image-section, .info-section {
                min-width: 100%;
            }
            .main-img-container {
                height: 350px;
            }
            .p-name {
                font-size: 1.5rem;
            }
            .price {
                font-size: 1.8rem;
            }
            .spec-key {
                width: 110px;
            }
            .buy-now {
                padding: 16px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .main-img-container {
                height: 300px;
            }
            .thumb {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>

<body>

    <nav class="nav"><a href="home.html"><i class="fa fa-arrow-left"></i> BACK</a></nav>

    <div class="product-container" id="productDetail"></div>

    <div class="review-section">
        <h3 style="margin-bottom: 20px;">Customer Reviews</h3>
        <div id="reviewList">Loading reviews...</div>
        <div style="margin-top: 40px; background: white; padding: 25px; border-radius: 20px; border: 1px solid #eee;">
            <p style="font-weight: 800; margin-bottom: 10px;">Rate this product</p>
            <div id="starInput" style="color: #ddd; font-size: 1.8rem; cursor: pointer; margin-bottom: 15px;">
                <i class="fa-solid fa-star" data-val="1"></i>
                <i class="fa-solid fa-star" data-val="2"></i>
                <i class="fa-solid fa-star" data-val="3"></i>
                <i class="fa-solid fa-star" data-val="4"></i>
                <i class="fa-solid fa-star" data-val="5"></i>
            </div>
            <textarea id="revText"
                style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #eee; background: #f9f9f9;"
                placeholder="Write your review here..." rows="3"></textarea>
            <button onclick="submitReview()"
                style="margin-top: 15px; background: #000; color: #fff; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 700; cursor: pointer;">Post
                Review</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, child, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDVDcAN5I6Duwb0f5nAIh1sThdK6ELGDGc",
            authDomain: "cartprime-shopping.firebaseapp.com",
            projectId: "cartprime-shopping",
            storageBucket: "cartprime-shopping.firebasestorage.app",
            messagingSenderId: "570068438689",
            appId: "1:570068438689:web:17b25f49f2b561fd29eae0",
            measurementId: "G-9GREWHMEYL"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        let selectedRating = 0;

        if (productId) {
            get(child(ref(db), `products/${productId}`)).then(snap => {
                if (snap.exists()) renderProduct(snap.val());
            });

            onValue(ref(db, `reviews/${productId}`), snap => {
                const list = document.getElementById('reviewList');
                list.innerHTML = "";
                if (snap.exists()) {
                    snap.forEach(rSnap => {
                        const r = rSnap.val();
                        list.innerHTML += `<div class="review-card"><div class="rev-name">${r.userName}</div><div class="star-rating">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div><p>${r.text}</p></div>`;
                    });
                } else { list.innerHTML = "<p>No reviews yet.</p>"; }
            });
        }

        function renderProduct(p) {
            let specsHTML = "";
            if (p.specs) Object.entries(p.specs).forEach(([k, v]) => { specsHTML += `<div class="spec-row"><div class="spec-key">${k}</div><div class="spec-val">${v}</div></div>`; });

            const isOut = p.outOfStock === true;
            const returnStatus = p.return === 'true' || p.return === true;
            const fullTitle = p.title || p.pTitle || p.name;

            document.getElementById('productDetail').innerHTML = `
                <div class="image-section">
                    <div class="main-img-container"><img src="${p.images[0]}" class="main-img" id="mainImg"></div>
                    <div class="thumb-container">
                        ${p.images.map((img, i) => `<img src="${img}" class="thumb ${i === 0 ? 'active' : ''}" onclick="window.changeImg(this, '${img}')">`).join('')}
                    </div>
                </div>
                <div class="info-section">
                    <h1 class="p-name">${fullTitle}</h1> 
                    <div class="price-box"><span class="price">₹${p.price}</span></div>
                    
                    <div class="policy-tag ${returnStatus ? 'policy-yes' : 'policy-no'}">
                        <i class="fa ${returnStatus ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                        ${returnStatus ? '7 Days Return Available' : 'No Return Policy'}
                    </div>

                    <div class="specs-box"><h4>Specifications</h4>${specsHTML || '<p>No specifications available.</p>'}</div>
                    <div class="desc-text">${p.desc || ''}</div>
                    
                    <button class="buy-now ${isOut ? 'out-btn' : ''}" ${isOut ? 'disabled' : ''} onclick="window.proceedToCheckout('${productId}', '${p.name.replace(/'/g, "\\'")}', '${p.price}', '${p.images[0]}', '${returnStatus}')">
                        ${isOut ? 'PRODUCT OUT OF STOCK' : 'BUY NOW'}
                    </button>
                </div>`;
        }

        window.proceedToCheckout = (id, name, price, img, ret) => {
            const orderData = {
                productId: id,
                productName: name,
                price: price,
                productImage: img,
                return: ret
            };
            localStorage.setItem('pendingOrder', JSON.stringify(orderData));
            location.href = 'checkout.html';
        };

        window.changeImg = (el, src) => {
            document.getElementById('mainImg').src = src;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        };

        const stars = document.querySelectorAll('#starInput i');
        stars.forEach(s => {
            s.onclick = () => {
                selectedRating = s.dataset.val;
                stars.forEach(i => i.style.color = i.dataset.val <= selectedRating ? "#ffcc00" : "#ddd");
            };
        });

        window.submitReview = () => {
            const text = document.getElementById('revText').value.trim();
            const user = auth.currentUser;
            if (!user) return Swal.fire('Login Please', '', 'warning');
            if (!selectedRating || !text) return Swal.fire('Error', 'Add rating and text', 'info');
            push(ref(db, `reviews/${productId}`), { userName: user.email.split('@')[0], rating: parseInt(selectedRating), text: text, timestamp: Date.now() })
                .then(() => { Swal.fire('Success', 'Review Posted!', 'success'); document.getElementById('revText').value = ""; });
        };
    </script>
</body>

</html>
