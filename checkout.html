<!DOCTYPE html>
<html lang="en">
    <link rel="icon" type="image/x-icon" href="https://i.ibb.co/v4rQ6Th6/545404-200-removebg-preview.png">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | CartPrime</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #000; --bg: #f4f7f6; --accent: #ffa000; --phonepe: #5f259f; --gpay: #4285F4; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            padding: 20px 15px; 
            color: #111; 
            display: flex;
            justify-content: center;
        }

        .checkout-container { 
            width: 100%;
            max-width: 500px; 
            background: #fff; 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }
        
        .prod-card { 
            display: flex; 
            gap: 15px; 
            align-items: center; 
            background: #f9f9f9; 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 25px; 
            border: 1px solid #eee; 
        }
        .prod-card img { width: 60px; height: 60px; object-fit: contain; border-radius: 8px; }
        
        h4 { font-size: 0.75rem; text-transform: uppercase; color: #888; letter-spacing: 1px; margin: 20px 0 12px; }
        
        .input-group { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
        }
        input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 5px; 
            border: 1px solid #e0e0e0; 
            border-radius: 12px; 
            outline: none; 
            font-size: 0.95rem; 
            transition: 0.3s; 
        }
        input:focus { border-color: var(--primary); }
        .full-width { grid-column: span 2; }

        .pay-methods { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .pay-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            padding: 15px; 
            border-radius: 14px; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 1rem; 
            transition: 0.3s; 
        }
        .gpay-btn { background: #fff; border: 2px solid var(--gpay); color: var(--gpay); }
        .phonepe-btn { background: var(--phonepe); color: #fff; border: none; }
        .pay-btn i { font-size: 1.3rem; }
        .pay-btn:active { transform: scale(0.97); }

        .proof-box { background: #fff8e1; padding: 15px; border-radius: 15px; border: 1px dashed var(--accent); margin-top: 20px; }
        .utr-input { border: 2px solid var(--accent) !important; margin-top: 10px; background: #fff; }

        .confirm-btn { 
            width: 100%; 
            padding: 18px; 
            background: #000; 
            color: #fff; 
            border: none; 
            border-radius: 15px; 
            font-weight: 800; 
            font-size: 1rem; 
            margin-top: 25px; 
            cursor: pointer; 
            transition: 0.3s;
        }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .checkout-container { padding: 20px 15px; }
            .input-group { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .confirm-btn { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="checkout-container">
    <h2 style="font-weight: 900; margin-bottom: 20px; letter-spacing: -1px;">Checkout</h2>

    <div id="productPreview" class="prod-card"></div>

    <h4>Delivery Address</h4>
    <div class="input-group">
        <input type="text" id="custName" class="full-width" placeholder="Full Name">
        <input type="number" id="custPhone" class="full-width" placeholder="Phone Number">
        <input type="text" id="house" class="full-width" placeholder="House Name / Flat No.">
        <input type="text" id="area" class="full-width" placeholder="Area / Street / Landmark">
        <input type="text" id="city" placeholder="Town / City">
        <input type="number" id="pincode" placeholder="Pincode">
    </div>

    <h4>Step 1: Pay via UPI App</h4>
    <div class="pay-methods">
        <a href="#" id="gpayLink" class="pay-btn gpay-btn">
            <i class="fab fa-google"></i> Google Pay
        </a>
        <a href="#" id="phonepeLink" class="pay-btn phonepe-btn">
            <i class="fas fa-mobile-alt"></i> PhonePe
        </a>
    </div>

    <div class="proof-box">
        <p style="font-size: 0.8rem; font-weight: 700; color: #856404;">Step 2: Enter Transaction Details</p>
        <p style="font-size: 0.75rem; color: #666; margin-top: 4px;">Enter the 12-digit UTR number after payment.</p>
        <input type="number" id="utrNumber" class="utr-input" placeholder="12 Digit UTR / Transaction ID">
    </div>

    <button class="confirm-btn" onclick="placeOrder()">CONFIRM ORDER</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDVDcAN5I6Duwb0f5nAIh1sThdK6ELGDGc",
        authDomain: "cartprime-shopping.firebaseapp.com",
        projectId: "cartprime-shopping",
        storageBucket: "cartprime-shopping.firebasestorage.app",
        messagingSenderId: "570068438689",
        appId: "1:570068438689:web:17b25f49f2b561fd29eae0",
        measurementId: "G-9GREWHMEYL"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const orderInfo = JSON.parse(localStorage.getItem('pendingOrder'));
    const myUpiId = "9778722796@fam"; 
    let currentUserEmailKey = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserEmailKey = user.email.replace(/\./g, ',');
        } else {
            Swal.fire('Login Required', 'Please login to continue.', 'error')
            .then(() => location.href = 'login.html');
        }
    });

    window.addEventListener('DOMContentLoaded', () => {
        if(orderInfo) {
            document.getElementById('productPreview').innerHTML = `
                <img src="${orderInfo.productImage}">
                <div>
                    <p style="font-weight: 800; font-size: 0.9rem;">${orderInfo.productName}</p>
                    <p style="color: #000; font-weight: 700;">₹${orderInfo.price}</p>
                </div>
            `;
            const amount = orderInfo.price.replace(/,/g, '');
            const upiUrl = `upi://pay?pa=${myUpiId}&pn=CartPrime&am=${amount}&cu=INR`;
            document.getElementById('gpayLink').href = upiUrl;
            document.getElementById('phonepeLink').href = upiUrl;
        } else {
            location.href = 'home.html';
        }

        const savedAddr = JSON.parse(localStorage.getItem('cartPrime_UserAddr'));
        if(savedAddr) {
            document.getElementById('custName').value = savedAddr.name || '';
            document.getElementById('custPhone').value = savedAddr.phone || '';
            document.getElementById('house').value = savedAddr.house || '';
            document.getElementById('area').value = savedAddr.area || '';
            document.getElementById('city').value = savedAddr.city || '';
            document.getElementById('pincode').value = savedAddr.pin || '';
        }
    });

    window.placeOrder = () => {
        const fields = {
            name: document.getElementById('custName').value.trim(),
            phone: document.getElementById('custPhone').value.trim(),
            house: document.getElementById('house').value.trim(),
            area: document.getElementById('area').value.trim(),
            city: document.getElementById('city').value.trim(),
            pin: document.getElementById('pincode').value.trim(),
            utr: document.getElementById('utrNumber').value.trim()
        };

        if(!fields.name || !fields.phone || !fields.house || !fields.city || !fields.pin) {
            return Swal.fire('Incomplete Details', 'Please fill in all address fields.', 'warning');
        }
        if(fields.utr.length < 10) {
            return Swal.fire('UTR Required', 'Please enter a valid 12-digit Transaction ID.', 'error');
        }
        if(!currentUserEmailKey) {
            return Swal.fire('Error', 'User account not verified. Please login again.', 'error');
        }

        localStorage.setItem('cartPrime_UserAddr', JSON.stringify(fields));

        Swal.fire({
            title: 'Confirm Order?',
            text: "Have you completed the payment?",
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'Yes, Confirm',
            confirmButtonColor: '#000'
        }).then((res) => {
            if(res.isConfirmed) {
                const orderId = Date.now(); // Unique ID for admin panel
                const finalOrder = {
                    customerName: fields.name,
                    customerPhone: fields.phone,
                    phone: fields.phone,
                    address: `${fields.house}, ${fields.area}, ${fields.city} - ${fields.pin}`,
                    productName: orderInfo.productName,
                    price: orderInfo.price,
                    productImage: orderInfo.productImage,
                    return: orderInfo.return,
                    transactionId: fields.utr,
                    date: new Date().toISOString().split('T')[0],
                    status: "Pending",
                    paymentStatus: "Verifying"
                };

                // 1. Email-ലേക്ക് സേവ് ചെയ്യുന്നു (യൂസറിന് ഓർഡർ കാണാൻ)
                const userOrderRef = ref(db, `orders/${currentUserEmailKey}/${orderId}`);
                
                // 2. നേരിട്ട് orders പാതയിലേക്ക് സേവ് ചെയ്യുന്നു (Admin Panel-ൽ ഫോൺ നമ്പർ ആയി കാണാൻ)
                const adminOrderRef = ref(db, `orders/${fields.phone}/${orderId}`);

                Promise.all([
                    set(userOrderRef, finalOrder),
                    set(adminOrderRef, finalOrder)
                ]).then(() => {
                    Swal.fire('Success', 'Order Placed Successfully!', 'success')
                    .then(() => location.href = 'orders.html');
                });
            }
        });
    };
</script>
</body>
</html>
