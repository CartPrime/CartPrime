<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | CartPrime</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #000; --bg: #f4f7f6; --accent: #ffa000; --phonepe: #5f259f; --gpay: #4285F4; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); padding: 20px 15px; color: #111; display: flex; justify-content: center; }
        .checkout-container { width: 100%; max-width: 500px; background: #fff; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .prod-card { display: flex; gap: 15px; align-items: center; background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #eee; }
        .prod-card img { width: 60px; height: 60px; object-fit: contain; border-radius: 8px; }
        h4 { font-size: 0.75rem; text-transform: uppercase; color: #888; letter-spacing: 1px; margin: 20px 0 12px; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { width: 100%; padding: 14px; margin-bottom: 5px; border: 1px solid #e0e0e0; border-radius: 12px; outline: none; font-size: 0.95rem; }
        .full-width { grid-column: span 2; }
        .pay-methods { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .pay-btn { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 15px; border-radius: 14px; text-decoration: none; font-weight: 700; font-size: 1rem; }
        .gpay-btn { background: #fff; border: 2px solid var(--gpay); color: var(--gpay); }
        .phonepe-btn { background: var(--phonepe); color: #fff; border: none; }
        .proof-box { background: #fff8e1; padding: 15px; border-radius: 15px; border: 1px dashed var(--accent); margin-top: 20px; }
        .confirm-btn { width: 100%; padding: 18px; background: #000; color: #fff; border: none; border-radius: 15px; font-weight: 800; margin-top: 25px; cursor: pointer; }
    </style>
</head>
<body>

<div class="checkout-container">
    <h2 style="font-weight: 900; margin-bottom: 20px;">Checkout</h2>
    <div id="productPreview" class="prod-card"></div>

    <h4>Delivery Address</h4>
    <div class="input-group">
        <input type="text" id="custName" class="full-width" placeholder="Full Name">
        <input type="number" id="custPhone" class="full-width" placeholder="Phone Number">
        <input type="text" id="house" class="full-width" placeholder="House Name">
        <input type="text" id="area" class="full-width" placeholder="Area / Street">
        <input type="text" id="city" placeholder="City">
        <input type="number" id="pincode" placeholder="Pincode">
    </div>

    <h4>Step 1: Pay via UPI App</h4>
    <div class="pay-methods">
        <a href="#" id="gpayLink" class="pay-btn gpay-btn"><i class="fab fa-google"></i> Google Pay</a>
        <a href="#" id="phonepeLink" class="pay-btn phonepe-btn"><i class="fas fa-mobile-alt"></i> PhonePe</a>
    </div>

    <div class="proof-box">
        <p style="font-size: 0.8rem; font-weight: 700; color: #856404;">Step 2: Upload Screenshot</p>
        <input type="file" id="paymentProof" accept="image/*" style="margin-top: 10px; width: 100%;">
    </div>

    <button class="confirm-btn" onclick="placeOrder()">CONFIRM ORDER</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDVDcAN5I6Duwb0f5nAIh1sThdK6ELGDGc",
        authDomain: "cartprime-shopping.firebaseapp.com",
        projectId: "cartprime-shopping",
        storageBucket: "cartprime-shopping.firebasestorage.app",
        messagingSenderId: "570068438689",
        appId: "1:570068438689:web:17b25f49f2b561fd29eae0",
        measurementId: "G-9GREWHMEYL"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const storage = getStorage(app);

    let orderInfo = JSON.parse(localStorage.getItem('pendingOrder'));
    const myUpiId = "9778722796@fam";

    window.addEventListener('DOMContentLoaded', () => {
        if(orderInfo) {
            document.getElementById('productPreview').innerHTML = `
                <img src="${orderInfo.productImage}">
                <div><p><b>${orderInfo.productName}</b></p><p>₹${orderInfo.price}</p></div>`;
            
            const amount = orderInfo.price.replace(/,/g, '');
            const upiParams = `pa=${myUpiId}&pn=CartPrime&am=${amount}&cu=INR`;
            document.getElementById('gpayLink').href = `upi://pay?${upiParams}&mc=0000&mode=02&purpose=00&orgid=159761`;
            document.getElementById('phonepeLink').href = `phonepe://pay?${upiParams}`;
        }
    });

    window.placeOrder = async () => {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const proofFile = document.getElementById('paymentProof').files[0];

        if(!name || !phone || !document.getElementById('city').value) {
            return Swal.fire('Wait!', 'Fill all address fields.', 'warning');
        }
        if(!proofFile) {
            return Swal.fire('Required', 'Please upload payment screenshot.', 'error');
        }

        const confirm = await Swal.fire({
            title: 'Place Order?',
            text: 'Did you complete the payment?',
            showCancelButton: true,
            confirmButtonText: 'Yes'
        });

        if(confirm.isConfirmed) {
            Swal.fire({ title: 'Processing...', didOpen: () => Swal.showLoading() });

            try {
                // Uploading to Storage
                const storageRef = sRef(storage, 'proofs/' + Date.now() + "_" + phone + ".jpg");
                const snapshot = await uploadBytes(storageRef, proofFile);
                const downloadURL = await getDownloadURL(snapshot.ref);

                // Saving to Database
                const orderId = Date.now();
                const finalData = {
                    customerName: name,
                    phone: phone,
                    address: document.getElementById('house').value + ", " + document.getElementById('city').value,
                    productName: orderInfo.productName,
                    price: orderInfo.price,
                    paymentProof: downloadURL,
                    status: "Pending",
                    date: new Date().toLocaleDateString()
                };

                await set(ref(db, 'orders/' + phone + '/' + orderId), finalData);
                Swal.fire('Success', 'Order Placed!', 'success').then(() => location.href='orders.html');
            } catch (err) {
                console.error(err);
                Swal.fire('Error', 'Check Firebase Rules (Storage & DB)', 'error');
            }
        }
    };
</script>
</body>
</html>
