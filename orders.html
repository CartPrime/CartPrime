<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | CartPrime</title>
    <link rel="icon" type="image/x-icon" href="https://i.ibb.co/v4rQ6Th6/545404-200-removebg-preview.png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #000; --bg: #f8fafc; --white: #fff; --red: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); padding: 20px 5%; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .back-btn { text-decoration: none; color: #000; font-size: 1.2rem; }
        .order-card { background: var(--white); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #eee; position: relative; }
        .order-status { font-size: 0.7rem; font-weight: 800; padding: 5px 12px; border-radius: 8px; text-transform: uppercase; float: right; }
        .status-shipped { background: #dcfce7; color: #15803d; }
        .status-pending { background: #fef9c3; color: #a16207; }
        .status-delivered { background: #e0f2fe; color: #0369a1; }
        .status-cancelled { background: #fee2e2; color: #b91c1c; }
        .status-confirmed { background: #e0f2fe; color: #0369a1; }
        .item-box { display: flex; gap: 15px; align-items: center; margin-top: 10px; }
        .item-box img { width: 70px; height: 70px; border-radius: 12px; object-fit: contain; background: #f8fafc; border: 1px solid #f1f1f1; }
        .item-details h3 { font-size: 1rem; color: #1e293b; margin-bottom: 4px; }
        .item-details p { font-size: 0.85rem; color: #64748b; }
        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-size: 0.85rem; transition: 0.3s; }
        .btn-cancel { background: #fee2e2; color: var(--red); }
        .btn-return { background: #000; color: #fff; }
        .empty-state { text-align: center; margin-top: 50px; color: #64748b; }
        .login-msg { text-align: center; padding: 40px 20px; background: white; border-radius: 20px; border: 1px solid #eee; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="home.html" class="back-btn"><i class="fa-solid fa-chevron-left"></i></a>
        <h1 style="font-weight: 800; letter-spacing: -1px;">My Orders</h1>
    </div>
    
    <div id="ordersList">
        <div class="empty-state">Verifying account...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDVDcAN5I6Duwb0f5nAIh1sThdK6ELGDGc",
            authDomain: "cartprime-shopping.firebaseapp.com",
            projectId: "cartprime-shopping",
            storageBucket: "cartprime-shopping.firebasestorage.app",
            messagingSenderId: "570068438689",
            appId: "1:570068438689:web:17b25f49f2b561fd29eae0",
            measurementId: "G-9GREWHMEYL"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // ലോക്കൽ സ്റ്റോറേജിൽ സേവ് ചെയ്തിട്ടുള്ള യൂസർ അഡ്രസ്സിൽ നിന്നും ഫോൺ നമ്പർ എടുക്കുന്നു
                const savedAddr = JSON.parse(localStorage.getItem('cartPrime_UserAddr'));
                const userPhone = savedAddr ? savedAddr.phone : null;

                if (userPhone) {
                    loadOrders(userPhone);
                } else {
                    document.getElementById('ordersList').innerHTML = `
                        <div class="empty-state">
                            <i class="fa-solid fa-phone-slash" style="font-size: 3rem; margin-bottom: 10px;"></i>
                            <p>No phone number linked to recent orders.</p>
                        </div>`;
                }
            } else {
                document.getElementById('ordersList').innerHTML = `
                    <div class="login-msg">
                        <i class="fa-solid fa-user-lock" style="font-size: 3rem; color: #cbd5e1; margin-bottom: 15px;"></i>
                        <h2 style="font-size: 1.2rem; margin-bottom: 10px;">Please Login</h2>
                        <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 20px;">Login with your email to see your orders.</p>
                        <a href="login.html" class="btn" style="background: black; color: white; padding: 12px 30px; text-decoration: none; border-radius: 12px; display: inline-block; text-align: center;">Login Now</a>
                    </div>`;
            }
        });

        function loadOrders(phone) {
            // ഇമെയിലിന് പകരം ഫോൺ നമ്പർ പാതയിൽ നിന്നും ഡാറ്റ എടുക്കുന്നു
            onValue(ref(db, `orders/${phone}`), (snapshot) => {
                const list = document.getElementById('ordersList');
                list.innerHTML = "";
                
                if (!snapshot.exists()) {
                    list.innerHTML = `<div class="empty-state">
                        <i class="fa-solid fa-box-open" style="font-size: 3rem; margin-bottom: 10px;"></i>
                        <p>No orders found for this mobile number (${phone}).</p>
                    </div>`;
                    return;
                }

                let ordersArr = [];
                snapshot.forEach(orderSnap => {
                    ordersArr.push({ id: orderSnap.key, ...orderSnap.val() });
                });

                ordersArr.reverse().forEach(order => {
                    const orderDate = new Date(order.date);
                    const today = new Date();
                    const diffInDays = Math.floor((today - orderDate) / (1000 * 60 * 60 * 24));
                    const showCancel = order.status === 'Pending';
                    const showReturn = order.return === 'true' && order.status === 'Delivered' && diffInDays <= 7;
                    
                    const deliveryMsg = order.deliveryDate ? 
                        `<p style="font-size: 0.8rem; color: #16a34a; font-weight: 800; margin-top: 5px;">
                            <i class="fa-solid fa-truck-fast"></i> Delivery Date: ${order.deliveryDate}
                        </p>` : '';

                    list.innerHTML += `
                        <div class="order-card">
                            <span class="order-status status-${order.status.toLowerCase()}">${order.status}</span>
                            <div class="item-box">
                                <img src="${order.productImage}" alt="">
                                <div class="item-details">
                                    <h3>${order.productName}</h3>
                                    <p>Price: ₹${order.price}</p>
                                    <p style="font-size: 0.75rem; margin-top: 4px;">Order Date: ${order.date}</p>
                                    ${deliveryMsg}
                                </div>
                            </div>
                            <div class="action-btns">
                                ${showCancel ? `<button class="btn btn-cancel" onclick="cancelOrder('${order.id}', '${phone}')">Cancel Order</button>` : ''}
                                ${showReturn ? `<button class="btn btn-return" onclick="requestReturn()">Request Return</button>` : ''}
                                ${(!showCancel && !showReturn) ? `<button class="btn" style="background:#f1f5f9; color:#64748b; cursor:default;">Order ${order.status}</button>` : ''}
                            </div>
                        </div>`;
                });
            });
        }

        window.cancelOrder = (orderId, phone) => {
            Swal.fire({
                title: 'Cancel Order?',
                text: "Confirm to cancel this order.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#000',
                confirmButtonText: 'Yes, Cancel'
            }).then((res) => {
                if(res.isConfirmed) {
                    update(ref(db, `orders/${phone}/${orderId}`), { status: 'Cancelled' })
                    .then(() => Swal.fire('Cancelled', 'Your order was cancelled.', 'success'));
                }
            });
        };

        window.requestReturn = () => {
            Swal.fire('Return Requested', 'Support will contact you soon.', 'success');
        };
    </script>
</body>
</html>
